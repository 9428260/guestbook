{% extends "common_popup.html" %}
{% block page_resource %}
<script src="{{ url_for('static', filename='js/task/popup/popup_task_runnable_time.js') }}"></script>
{% endblock %}

{% block page_content %}
<div class="popup-contents">
    <p class="popup-text">태스크 실행가능시간 추가 팝업 입니다.</p>

    <div class="con_title">
        <h3 class="sub-title">실행가능시간 정보</h3>
    </div>

    <table class="Table Form-type">
        <colgroup>
            <col class="w180px">
            <col class="wAuto">
        </colgroup>
        <tbody>
            <tr>
                <th>유형</th>
                <td>
                    <select id="runnable_time_mode" name="runnable_time_mode" class="Select Select_c" data-bind-option="value:text" data-bind="options:data, selectedOptions: option_selected"></select>
                </td>
            </tr>
            <tr>
                <th>실행가능시간(From)</th>
                <td>
                    <span id="year">
                        <div class="time_input_wrap w80px">
                            <select id="runnable_time_year" name="runnable_time_year" class="Select Select_c" data-bind-option="value:text" data-bind="options:data, selectedOptions: option_selected"></select>
                        </div>
                        <div class="time_unit_label">년</div>
                    </span>
                    <span id="month">
                        <div class="time_input_wrap">
                            <select id="runnable_time_month" name="runnable_time_month" class="Select Select_c" data-bind-option="value:text" data-bind="options:data, selectedOptions: option_selected"></select>
                        </div>
                        <div class="time_unit_label">월</div>
                    </span>
                    <span id="date">
                        <div class="time_input_wrap">
                            <select id="runnable_time_date" name="runnable_time_date" class="Select Select_c" data-bind-option="value:text" data-bind="options:data, selectedOptions: option_selected"></select>
                        </div>
                        <div class="time_unit_label">일</div>
                    </span>
                    <span id="day">
                        <div class="time_input_wrap">
                            <select id="runnable_time_day" name="runnable_time_day" class="Select Select_c" data-bind-option="value:text" data-bind="options:data, selectedOptions: option_selected"></select>
                        </div>
                        <div class="time_unit_label"></div>
                    </span>
                    <span id="hour">
                        <div class="time_input_wrap">
                            <select id="runnable_time_hour" name="runnable_time_hour" class="Select Select_c" data-bind-option="value:text" data-bind="options:data, selectedOptions: option_selected"></select>
                        </div>
                        <div class="time_unit_label">시</div>
                    </span>
                    <span id="minute">
                        <div class="time_input_wrap">
                            <select id="runnable_time_minute" name="runnable_time_minute" class="Select Select_c" data-bind-option="value:text" data-bind="options:data, selectedOptions: option_selected"></select>
                        </div>
                        <div class="time_unit_label">분 으로부터</div>
                    </span>
                </td>
            </tr>
            <tr>
                <th>유효시간(Range)</th>
                <td>
                    <input type="text" id="range_minute" name="range_minute" class="Textinput textinput_c w110px" placeholder="Positive Num."/>
                    <select id="range_mode" name="range_mode" class="Select Select_c" data-bind-option="value:text" data-bind="options:data, selectedOptions: option_selected"></select>
                    <div style="display: inline-block;">동안 실행 가능</div>
                </td>
            </tr>
            <tr>
                <th>타임존(UTC offset)</th>
                <td>
                    <select id="runnable_time_timezone" name="runnable_time_timezone" class="Select Select_c" data-bind-option="value:text" data-bind="options:data, selectedOptions: option_selected"></select>
                </td>
            </tr>
        </tbody>
    </table>
    <!--button-->
    <div class="popup-btn_wrap">
        <button id="btn_add"   name="btn_add"   class="Button btn bg-red">추가</button>
        <button id="btn_close" name="btn_close" class="Button btn">닫기</button>
    </div>
    <!--//button-->
</div>
{% endblock %}
