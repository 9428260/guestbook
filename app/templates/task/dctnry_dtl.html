{% extends "common.html" %}
{% block page_resource %}
<script src="{{ url_for('static', filename='js/task/dctnry_dtl.js') }}"></script>
<script type="text/javascript">
{% if response is defined %}
var response = JSON.parse('{{ response|tojson }}');
{% endif %}
</script>
{% endblock %}

{% block page_content %}
<!-- contents -->
<div class="contents-area">
    <!-- top area -->
    <div class="cont_head">
        <h2 class="title">단어사전 정보</h2>
        <div class="title-txt">단어사전 정보를 조회/변경할 수 있습니다.</div>
    </div>

    <div class="cont_body">
        <div id="base_info" class="table_wrap">
            <div class="con_title">
                <h3 class="sub-title">기본정보</h3>
            </div>
            <table class="Table Form-type">
                <colgroup>
                    <col class="w150px">
                    <col class="wAuto">
                </colgroup>
                <tbody>
                <tr style="display : None">
                    <th>No.</th>
                    <td>
                        <div class="input_wrap">
                            <input id="dctnry_voca_no" class="Textinput" placeholder="" />
                        </div>
                    </td>
                </tr>
                <tr>
                    <th>단어명*</th>
                    <td>
                        <div class="input_wrap">
                            <input id="dctnry_word" class="Textinput with_btn validation_tgt" data-check-result="ok" placeholder="" />
                            <button id="btn_check_id" name="btn_sel" class='Button btn sm bg-red' data-disabled="true">확인</button>
                            <p class="validation_msg"></p>
                        </div>
                    </td>
                </tr>
                <tr>
                    <th>구분*</th>
                    <td>
                        <select id="dctnry_type" name="dctnry_type" class="Select Select_c validation_tgt"
                                data-bind-option="value:text"
                                data-bind="options:data, selectedOptions: option_selected"
                                data-placeholder="선택"></select>
                        <p class="validation_msg"></p>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <div id="history_info" class="table_wrap" style="display: none">
            <div class="con_title">
                <h3 class="sub-title">이력정보</h3>
            </div>
            <table class="Table Form-type">
                <colgroup>
                    <col class="w150px">
                    <col class="wAuto">
                </colgroup>
                <tbody>
                    <tr>
                        <th>최초생성자</th>
                        <td></td>
                    </tr>
                    <tr>
                        <th>최초생성일시</th>
                        <td></td>
                    </tr>
                    <tr>
                        <th>최종변경자</th>
                        <td></td>
                    </tr>
                    <tr>
                        <th>최종변경일시</th>
                        <td></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <!-- Button area -->
    <div class="btn-wrap btn-right">
        <button class="Button btn" id="btn_list_dctnry">목록</button>
        <button class="Button btn bg-red" id="btn_save_data">저장</button>
    </div>
</div>
<!-- //contents wrap-->
{% endblock %}
