{% extends "common.html" %}
{% block page_resource %}
<script src="{{ url_for('static', filename='js/task/task_hst.js') }}"></script>
<script type="text/javascript">
{% if response is defined %}
var response = {{ response|safe }};
{% endif %}
</script>
{% endblock %}

{% block page_content %}
<!-- contents -->
<div class="contents-area">
    <!-- top area -->
    <div class="cont_head">
        <h2 class="title">태스크 발행 이력</h2>
        <div class="title-txt">태스크의 발행 이력을 조회합니다.</div>
    </div>

    <div class="cont_body">
        <div class="search_wrap">
            <div class="con_title">
                <h3 class="sub-title">조회 조건</h3>
            </div>

            <div class="search_table_wrap">
                <div class="search_area_title w80px">태스크 ID</div>
                <div class="search_area_input">
                    <input type="text" id="task_id" name="task_id" class="Textinput textinput_c w180px" placeholder="Exact"/>
                    <button id="btn_sel_task_id" name="btn_sel_task_id" class='Button input'><span class='icon_search_input'></span></button>
                </div>
                <div class="search_area_init_btn">
                    <button id="btn_init" name="btn_sel" class='Button btn sm'>초기화</button>
                </div>
                <div class="search_area_sel_btn">
                    <button id="btn_sel" name="btn_sel" class='Button btn sm bg-red'><span class='icon_search'></span>조회</button>
                </div>
            </div>
        </div>

        <div class="table_wrap">
            <div class="con_title">
                <h3 class="sub-title">조회 결과</h3>
            </div>
            <div class="list" id="task_hst_grid"></div>
        </div>

        <!-- Button area -->
        <div class="btn-wrap btn-right">
            <button class="Button btn" id="btn_list">태스크 목록</button>
        </div>
    </div>
</div>
<!-- //contents wrap-->
{% endblock %}
