{% extends "common.html" %}

{% block page_resource %}
<!-- jQuery -->
<script src="{{ url_for('static', filename='js/libs/jquery/3.5.1/jquery-3.5.1.min.js') }}"></script>

<!-- OPME Console Bootstrap Multiselect JS -->
<script src="{{ url_for('static', filename='js/libs/bootstrap_multiselect/bootstrap_multiselect.js') }}"></script>

<!-- OPME Console Multi Select JS -->
<script src="{{ url_for('static', filename='js/sample/select_multi.js') }}"></script>

<!-- OPME Console Multiselect CSS -->
<link href="{{ url_for('static', filename='css/libs/bootstrap_custom/multiselect.css') }}" rel="stylesheet">

<!-- Custom CSS for Multi Select -->
<style>
    .refer {
        font-size: 0.875rem;
        color: #6c757d;
    }
    .refer a {
        color: #007bff;
        text-decoration: none;
    }
    .refer a:hover {
        text-decoration: underline;
    }
</style>

<!-- Error prevention for common.js -->
<script>
// Prevent common.js errors by mocking required functions
if (typeof opme_getCode === 'undefined') {
    window.opme_getCode = function(p_code_list, p_isAsync) {
        console.log('Mock opme_getCode called with:', p_code_list);
        return {
            'user_privilege': ['5', 'Normal-User']
        };
    };
}

// Override getCommonInfo to prevent AJAX calls
if (typeof getCommonInfo === 'function') {
    var originalGetCommonInfo = getCommonInfo;
    window.getCommonInfo = function() {
        console.log('Mock getCommonInfo called - preventing AJAX calls');
        return false;
    };
}
</script>
{% endblock %}

{% block page_content %}
<div class="contents-area">
    <div class="cont_head">
        <h2 class="title">Multi Select</h2>
        <div class="title-txt">다양한 Multi Select 예제들을 확인할 수 있습니다.</div>
    </div>
    <div class="cont_body">
        <div class="search_wrap">
            <div class="con_title">
                <h3 class="sub-title">Basic examples</h3>
            </div>

        <div class="row">
            <div class="col-lg-3">
                <div class="card">
                    <div class="card-body">

                        <!-- Default multiselect -->
                        <div class="form-group">
                            <label>Default select</label>
                            <div class="multiselect-native-select">
                                <select class="form-control multiselect" multiple="multiple" data-fouc="">
                                    <option value="cheese">Cheese</option>
                                    <option value="tomatoes">Tomatoes</option>
                                    <option value="mozarella">Mozzarella</option>
                                    <option value="mushrooms">Mushrooms</option>
                                </select>
                            </div>
                        </div>
                        <!-- /default multiselect -->

                        <!-- Default multiselect with selected options -->
                        <div class="form-group">
                            <label>Default selected options</label>
                            <div class="multiselect-native-select">
                                <select class="form-control multiselect" multiple="multiple" data-fouc="">
                                    <option value="cheese">Cheese</option>
                                    <option value="tomatoes" selected="">Tomatoes</option>
                                    <option value="mozarella">Mozzarella</option>
                                    <option value="mushrooms" selected="">Mushrooms</option>
                                </select>
                            </div>
                        </div>
                        <!-- /default multiselect with selected options -->

                        <!-- Options with divider -->
                        <div class="form-group">
                            <label>Options with divider</label>
                            <div class="multiselect-native-select">
                                <select class="form-control multiselect" multiple="multiple" data-fouc="">
                                    <option value="cheese">Cheese</option>
                                    <option value="tomatoes">Tomatoes</option>
                                    <option data-role="divider"></option>
                                    <option value="mozarella">Mozzarella</option>
                                    <option value="mushrooms">Mushrooms</option>
                                </select>
                            </div>
                        </div>
                        <!-- /options with divider -->

                        <!-- Option groups support -->
                        <div class="form-group">
                            <label>Option groups support</label>
                            <div class="multiselect-native-select">
                                <select class="form-control multiselect" multiple="multiple" data-fouc="">
                                    <optgroup label="Mathematics">
                                        <option value="analysis">Analysis</option>
                                        <option value="algebra">Linear Algebra</option>
                                        <option value="discrete">Discrete Mathematics</option>
                                    </optgroup>
                                    <optgroup label="Computer Science">
                                        <option value="programming">Introduction to Programming</option>
                                        <option value="complexity">Complexity Theory</option>
                                        <option value="software">Software Engineering</option>
                                    </optgroup>
                                </select>
                            </div>
                        </div>
                        <!-- /option groups support -->

                        <!-- Options with and without groups -->
                        <div class="form-group">
                            <label>Options with and without groups</label>
                            <div class="multiselect-native-select">
                                <select class="form-control multiselect" multiple="multiple" data-fouc="">
                                    <option value="lab">Lab Course</option>
                                    <option value="proseminar">Proseminar</option>
                                    <optgroup label="Mathematics">
                                        <option value="analysis">Analysis</option>
                                        <option value="algebra">Linear Algebra</option>
                                        <option value="probability">Probability Theory</option>
                                    </optgroup>
                                    <optgroup label="Computer Science">
                                        <option value="programming">Introduction to Programming</option>
                                        <option value="automata">Automata Theory</option>
                                        <option value="software">Software Engineering</option>
                                    </optgroup>
                                </select>
                            </div>
                        </div>
                        <!-- /options with and without groups -->

                        <!-- Dropdown with max height -->
                        <div class="form-group">
                            <label>Dropdown with max height</label>
                            <div class="multiselect-native-select">
                                <select class="form-control multiselect-max-height" multiple="multiple" data-fouc="">
                                    <optgroup label="Mathematics">
                                        <option value="analysis">Analysis</option>
                                        <option value="algebra">Linear Algebra</option>
                                        <option value="discrete">Discrete Mathematics</option>
                                    </optgroup>
                                    <optgroup label="Computer Science">
                                        <option value="programming">Introduction to Programming</option>
                                        <option value="complexity">Complexity Theory</option>
                                        <option value="software">Software Engineering</option>
                                    </optgroup>
                                </select>
                            </div>
                        </div>
                        <!-- /dropdown with max height -->

                        <!-- Select All option -->
                        <div class="form-group">
                            <label>With <span class="font-weight-semibold">Select all</span> option</label>
                            <div class="multiselect-native-select">
                                <select class="form-control multiselect-select-all" multiple="multiple" data-fouc="">
                                    <option value="cheese">Cheese</option>
                                    <option value="tomatoes">Tomatoes</option>
                                    <option value="mozarella">Mozzarella</option>
                                    <option value="mushrooms">Mushrooms</option>
                                </select>
                            </div>
                        </div>
                        <!-- /select All option -->

                        <!-- Select All option selected -->
                        <div class="form-group">
                            <label>Select all option response</label>
                            <div class="multiselect-native-select">
                                <select class="form-control multiselect-select-all" multiple="multiple" data-fouc="">
                                    <option value="cheese" selected="">Cheese</option>
                                    <option value="tomatoes" selected="">Tomatoes</option>
                                    <option value="mozarella" selected="">Mozzarella</option>
                                    <option value="mushrooms" selected="">Mushrooms</option>
                                </select>
                            </div>
                        </div>
                        <!-- /select All option selected -->

                    </div>
                </div>
            </div>

            <div class="col-lg-3">
                <div class="card">
                    <div class="card-body">

                        <!-- Filtering options -->
                        <div class="form-group">
                            <label><span class="font-weight-semibold">Filtering</span> option</label>
                            <div class="multiselect-native-select">
                                <select class="form-control multiselect-filtering" multiple="multiple" data-fouc="">
                                    <option value="cheese">Cheese</option>
                                    <option value="tomatoes">Tomatoes</option>
                                    <option value="mozarella">Mozzarella</option>
                                    <option value="mushrooms">Mushrooms</option>
                                </select>
                            </div>
                        </div>
                        <!-- /filtering options -->

                        <!-- Select All and Filtering features -->
                        <div class="form-group">
                            <label><span class="font-weight-semibold">Select all</span> and <span class="font-weight-semibold">Filtering</span> features</label>
                            <div class="multiselect-native-select">
                                <select class="form-control multiselect-select-all-filtering" multiple="multiple" data-fouc="">
                                    <option value="cheese">Cheese</option>
                                    <option value="tomatoes">Tomatoes</option>
                                    <option value="mozarella">Mozzarella</option>
                                    <option value="mushrooms">Mushrooms</option>
                                </select>
                            </div>
                        </div>
                        <!-- /select All and Filtering features -->

                        <!-- Clickable optgroups -->
                        <div class="form-group">
                            <label>Clickable optgroups</label>
                            <div class="multiselect-native-select">
                                <select class="form-control multiselect-clickable-groups" multiple="multiple" data-fouc="">
                                    <optgroup label="Mathematics">
                                        <option value="analysis">Analysis</option>
                                        <option value="algebra">Linear Algebra</option>
                                        <option value="discrete">Discrete Mathematics</option>
                                    </optgroup>
                                    <optgroup label="Computer Science">
                                        <option value="programming">Introduction to Programming</option>
                                        <option value="complexity">Complexity Theory</option>
                                        <option value="software">Software Engineering</option>
                                    </optgroup>
                                    <optgroup label="Physics">
                                        <option value="mechanics">Classical Mechanics</option>
                                        <option value="magnetism">Electromagnetism</option>
                                        <option value="quantum">Quantum Mechanics</option>
                                    </optgroup>
                                </select>
                            </div>
                        </div>
                        <!-- /clickable optgroups -->

                        <!-- Full featured example -->
                        <div class="form-group">
                            <label>Full featured example</label>
                            <div class="multiselect-native-select">
                                <select class="form-control multiselect-full-featured" multiple="multiple" data-fouc="">
                                    <option value="lab">Lab Course</option>
                                    <option value="proseminar">Proseminar</option>
                                    <optgroup label="Mathematics">
                                        <option value="analysis">Analysis</option>
                                        <option value="algebra">Linear Algebra</option>
                                        <option value="probability">Probability Theory</option>
                                    </optgroup>
                                    <optgroup label="Computer Science">
                                        <option value="programming">Introduction to Programming</option>
                                        <option value="complexity">Complexity Theory</option>
                                        <option value="software">Software Engineering</option>
                                    </optgroup>
                                </select>
                            </div>
                        </div>
                        <!-- /full featured example -->

                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
