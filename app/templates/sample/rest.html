{% extends "common.html" %}
{% block page_resource %}
<script src="{{ url_for('static', filename='js/sample/rest.js') }}"></script>
{% endblock %}

{% block page_content %}
<!-- contents -->
<div class="contents-area">
    <!-- top area -->
    <div class="cont_head">
        <h2 class="title">REST</h2>
        <div class="title-txt">REST API 호출 테스트 입니다.</div>
    </div>

    <div class="cont_body">
        <div class="search_wrap">
            <div class="con_title">
                <h3 class="sub-title">조회 조건</h3>
            </div>

            <div class="search_table_wrap">
                <div class="baba">ID</div>
                <div class="baba2">
                    <input type="text" class="Textinput textinput_c w100px" placeholder="사용자 ID" id="user_id" name="user_id"/>
                </div>
                <div class="baba">이름</div>
                <div class="baba2">
                    <input type="text" class="Textinput textinput_c w95px" placeholder="사용자 이름" id="user_nm" name="user_nm"/>
                </div>
                <div class="baba">권한</div>
                <div class="baba2">
                    <select class="Select Select_c" id="role" name="role" data-bind-option="key:value" data-bind="options:data, selectedOptions: option_selected"></select>
                </div>
                <div class="baba">상태</div>
                <div class="baba2">
                    <select class="Select Select_c" id="status" name="status" data-bind-option="key:value" data-bind="options:data, selectedOptions: option_selected"></select>
                </div>
                <div class="baba3">
                    <button class='Button btn sm' id="btn_init">초기화</button>
                </div>
                <div class="baba4">
                    <button class='Button btn sm bg-red' id="btn_sel" name="btn_sel"><span class='icon_search'></span>조회</button>
                </div>
            </div>
        </div>

        <div class="table_wrap">
            <div class="con_title">
                <h3 class="sub-title">조회 결과</h3>
                <div class="btn-right">
                    <div class="tip_btn">
                        <button class="Button btn-ico btn-add" id="add_code">추가/등록</button>
                        <div class="Tooltip">추가/등록</div>
                    </div>
                    <div class="tip_btn">
                        <button class="Button btn-ico btn-del" id="del_code">삭제</button>
                        <div class="Tooltip">삭제</div>
                    </div>
                </div>
            </div>
            <div class="list" id="code_gr"></div>
        </div>
    </div>
</div>
<!-- //contents wrap-->
{% endblock %}
