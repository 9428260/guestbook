{% extends "common.html" %}

{% block page_resource %}
<!-- jQuery -->
<script src="{{ url_for('static', filename='js/libs/jquery/3.5.1/jquery-3.5.1.min.js') }}"></script>

<!-- OPME Console Switchery JS -->
<script src="{{ url_for('static', filename='js/libs/plugins/forms/styling/switchery.min.js') }}"></script>

<!-- OPME Console Switchery Sample JS -->
<script src="{{ url_for('static', filename='js/sample/checkboxs_radios.js') }}"></script>

<!-- OPME Console Switchery CSS -->
<link href="{{ url_for('static', filename='css/libs/bootstrap_custom/switchery.css') }}" rel="stylesheet">

<!-- Custom CSS for Switchery -->
<style>
    .refer {
        font-size: 0.875rem;
        color: #6c757d;
    }
    .refer a {
        color: #007bff;
        text-decoration: none;
    }
    .refer a:hover {
        text-decoration: underline;
    }
</style>

<!-- Error prevention for common.js -->
<script>
// Prevent common.js errors by mocking required functions
if (typeof opme_getCode === 'undefined') {
    window.opme_getCode = function(p_code_list, p_isAsync) {
        console.log('Mock opme_getCode called with:', p_code_list);
        return {
            'user_privilege': ['5', 'Normal-User']
        };
    };
}

// Override getCommonInfo to prevent AJAX calls
if (typeof getCommonInfo === 'function') {
    var originalGetCommonInfo = getCommonInfo;
    window.getCommonInfo = function() {
        console.log('Mock getCommonInfo called - preventing AJAX calls');
        return false;
    };
}
</script>
{% endblock %}

{% block page_content %}
<div class="contents-area">
    <div class="cont_head">
        <h2 class="title">Switchery Toggles</h2>
        <div class="title-txt">다양한 Switchery 토글 예제들을 확인할 수 있습니다.</div>
    </div>
    <div class="cont_body">
        <div class="search_wrap">
            <div class="con_title">
                <h3 class="sub-title">Switchery Examples</h3>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-3">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">Default switchers</h5>
                    </div>
                    <div class="card-body">
                        <div class="form-check form-check-switchery">
                            <label class="form-check-label">
                                <input type="checkbox" class="switchery" checked>
                                Checked switch
                            </label>
                        </div>

                        <div class="form-check form-check-switchery">
                            <label class="form-check-label">
                                <input type="checkbox" class="switchery">
                                Unchecked switch
                            </label>
                        </div>

                        <div class="form-check form-check-switchery">
                            <label class="form-check-label">
                                <input type="checkbox" class="switchery" checked disabled>
                                Checked disabled
                            </label>
                        </div>

                        <div class="form-check form-check-switchery">
                            <label class="form-check-label">
                                <input type="checkbox" class="switchery" disabled>
                                Unchecked disabled
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-3">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">Sticked to the right</h5>
                    </div>
                    <div class="card-body">
                        <div class="form-check form-check-switchery form-check-right">
                            <label class="form-check-label">
                                <input type="checkbox" class="switchery" checked>
                                Checked switch
                            </label>
                        </div>

                        <div class="form-check form-check-switchery form-check-right">
                            <label class="form-check-label">
                                <input type="checkbox" class="switchery">
                                Unchecked switch
                            </label>
                        </div>

                        <div class="form-check form-check-switchery form-check-right">
                            <label class="form-check-label">
                                <input type="checkbox" class="switchery" checked disabled>
                                Checked disabled
                            </label>
                        </div>

                        <div class="form-check form-check-switchery form-check-right">
                            <label class="form-check-label">
                                <input type="checkbox" class="switchery" disabled>
                                Unchecked disabled
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-3">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">Out Text switchers</h5>
                    </div>
                    <div class="card-body">
                        <div class="form-check form-check-switchery">
                            <label class="form-check-label">
                                <input type="checkbox" class="switchery" checked>
                                ON
                            </label>
                        </div>

                        <div class="form-check form-check-switchery">
                            <label class="form-check-label">
                                <input type="checkbox" class="switchery">
                                OFF
                            </label>
                        </div>

                        <div class="form-check form-check-switchery">
                            <label class="form-check-label">
                                <input type="checkbox" class="switchery" checked disabled>
                                ON
                            </label>
                        </div>

                        <div class="form-check form-check-switchery">
                            <label class="form-check-label">
                                <input type="checkbox" class="switchery" disabled>
                                OFF
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-3">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">Inner Text switchers</h5>
                    </div>
                    <div class="card-body">
                        <div class="form-check form-check-switchery inner-text-1">
                            <label class="form-check-label">
                                <input type="checkbox" class="switchery" checked>
                                <span class="form-check-input-switchery-text">ON</span>
                            </label>
                        </div>

                        <div class="form-check form-check-switchery inner-text-1">
                            <label class="form-check-label">
                                <input type="checkbox" class="switchery">
                                <span class="form-check-input-switchery-text">OFF</span>
                            </label>
                        </div>

                        <div class="form-check form-check-switchery inner-text-1">
                            <label class="form-check-label">
                                <input type="checkbox" class="switchery" checked disabled>
                                <span class="form-check-input-switchery-text">ON</span>
                            </label>
                        </div>

                        <div class="form-check form-check-switchery inner-text-1">
                            <label class="form-check-label">
                                <input type="checkbox" class="switchery" disabled>
                                <span class="form-check-input-switchery-text">OFF</span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </div>


    </div>
</div>
{% endblock %}
