{% extends "common.html" %}
{% block page_resource %}
<script src="{{ url_for('static', filename='js/system/system_dtl.js') }}"></script>
<script type="text/javascript">
{% if response is defined %}
var response = JSON.parse('{{ response|tojson }}');
{% endif %}
</script>
{% endblock %}

{% block page_content %}
<!-- contents -->
<div class="contents-area">
    <!-- top area -->
    <div class="cont_head">
        <h2 class="title">시스템속성 정보</h2>
        <div class="title-txt">시스템속성 정보를 조회할 수 있습니다.</div>
    </div>

    <div class="cont_body">
        <div id="ver_info" class="table_wrap">
            <div class="con_title">
                <h3 class="sub-title">버전정보</h3>
            </div>
            <table class="Table Form-type">
                <colgroup>
                    <col class="w180px">
                    <col class="wAuto">
                </colgroup>
                <tbody>
                    <tr>
                        <th id="sysprop_vname"></th>
                        <td id="sysprop_vval"></td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div id="conn_info" class="table_wrap">
            <div class="con_title">
                <h3 class="sub-title">연결정보</h3>
            </div>
            <div class="list" id="sysprop_grid"></div>
        </div>
        <div id="set_info" class="table_wrap">
            <div class="con_title">
                <h3 class="sub-title">마스터 세팅정보</h3>
            </div>
            <div class="list" id="sysprops_grid"></div>
        </div>
    </div>
    <!-- Button area -->
</div>
<!-- //contents wrap-->
{% endblock %}
