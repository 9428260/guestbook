{% extends "common.html" %}
{% block page_resource %}
<script src="{{ url_for('static', filename='js/file/filehub_dtl.js') }}"></script>
<script type="text/javascript">
{% if response is defined %}
var response = JSON.parse('{{ response|tojson }}');
{% endif %}
</script>
{% endblock %}

{% block page_content %}
<!-- contents -->
<div class="contents-area">
    <!-- top area -->
    <div class="cont_head">
        <h2 class="title">파일허브 정보</h2>
        <div class="title-txt">파일허브 상세정보 확인, 추가, 변경이 가능합니다. (변경은 소유자 또는 Super-User 만 가능)</div>
    </div>

    <div class="cont_body">
        <div id="base_info" class="table_wrap">
            <div class="con_title">
                <h3 class="sub-title">기본정보</h3>
            </div>
            <table class="Table Form-type">
                <colgroup>
                    <col class="w150px">
                    <col class="wAuto">
                </colgroup>
                <tbody>
                    <tr>
                        <th>파일허브 ID*</th>
                        <td>
                            <div class="input_wrap">
                                <input id="id" name="id" class="Textinput with_btn validation_tgt" data-check-result="ok" placeholder=""/>
                                <button id="btn_check_id" name="btn_sel" class='Button btn sm bg-red' data-disabled="true">확인</button>
                                <p class="validation_msg"></p>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <th>소유자 ID*</th>
                        <td>
                            <div class="input_wrap">
                                <input id="owner_id" name="owner_id" class="Textinput validation_tgt" placeholder=""/>
                                <button id="btn_sel_owner_id" name="btn_sel_owner_id" class='Button input'><span class='icon_search_input'></span></button>
                                <p class="validation_msg"></p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div id="permission_info" class="table_wrap">
            <div class="con_title">
                <h3 class="sub-title">권한정보</h3>
                <div class="btn-right">
                    <div class="tip_btn">
                        <button class="Button btn-ico btn-user_add" id="btn_add_user">사용자추가</button>
                        <div class="Tooltip">사용자 추가</div>
                    </div>
                    <div class="tip_btn">
                        <button class="Button btn-ico btn-usergrp_add" id="btn_add_usergrp">사용자그룹 추가</button>
                        <div class="Tooltip">사용자그룹 추가</div>
                    </div>
                    <div class="tip_btn">
                        <button class="Button btn-ico btn-add" id="btn_add_task">태스크 추가</button>
                        <div class="Tooltip">태스크 추가</div>
                    </div>
                    <div class="tip_btn">
                        <button class="Button btn-ico btn-del" id="btn_del_entity">삭제</button>
                        <div class="Tooltip">삭제</div>
                    </div>
                </div>
            </div>
            <div class="list" id="permission_grid"></div>
        </div>
        <div id="history_info" class="table_wrap" style="display: none;">
            <div class="con_title">
                <h3 class="sub-title">이력정보</h3>
            </div>
            <table class="Table Form-type">
                <colgroup>
                    <col class="w150px">
                    <col class="wAuto">
                </colgroup>
                <tbody>
                <tr>
                    <th>최초생성자</th>
                    <td></td>
                </tr>
                <tr>
                    <th>최초생성일시</th>
                    <td></td>
                </tr>
                <tr>
                    <th>최종변경자</th>
                    <td></td>
                </tr>
                <tr>
                    <th>최종변경일시</th>
                    <td></td>
                </tr>
                </tbody>
            </table>
        </div>
        <!-- Button area -->
        <div class="btn-wrap btn-right">
            <button class="Button btn" id="btn_list">목록</button>
            <button class="Button btn bg-red" id="btn_save">저장</button>
        </div>
    </div>
</div>
<!-- //contents -->
{% endblock %}
