{% extends "common.html" %}
{% block page_resource %}
<script src="{{ url_for('static', filename='js/user/usergrp_dtl.js') }}"></script>
<script type="text/javascript">
{% if response is defined %}
var response = JSON.parse('{{ response|tojson }}');
{% endif %}
</script>
{% endblock %}

{% block page_content %}
<!-- contents -->
<div class="contents-area">
    <!-- top area -->
    <div class="cont_head">
        <h2 class="title">사용자그룹 정보</h2>
        <div class="title-txt">사용자그룹 상세정보 확인, 등록, 수정이 가능합니다.</div>
    </div>

    <div class="cont_body">
        <div class="half-layout">
            <!-- col1 :start -->
            <div class="half-contents">
                <div id="base_info" class="table_wrap">
                    <div class="con_title">
                        <h3 class="sub-title">기본정보</h3>
                    </div>
                    <table class="Table Form-type">
                        <colgroup>
                            <col class="w150px">
                            <col class="wAuto">
                        </colgroup>
                        <tbody>
                            <tr>
                                <th>사용자그룹 ID*</th>
                                <td>
                                    <div class="input_wrap">
                                        <input id="usergrp_id" name="usergrp_id" class="Textinput with_btn validation_tgt" data-check-result="ok" placeholder=""/>
                                        <button id="btn_check_id" name="btn_sel" class='Button btn sm bg-red' data-disabled="true">확인</button>
                                        <p class="validation_msg"></p>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <th>소유자 ID*</th>
                                <td>
                                    <div class="input_wrap">
                                        <input id="owner_id" name="owner_id" class="Textinput validation_tgt" placeholder=""/>
                                        <button id="btn_sel_owner_id" name="btn_sel_owner_id" class='Button input'><span class='icon_search_input'></span></button>
                                        <p class="validation_msg"></p>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <th>설명</th>
                                <td>
                                    <input id="description" name="description" class="Textinput validation_tgt" placeholder=""/>
                                    <p class="validation_msg"></p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div id="history_info" class="table_wrap" style="display: none;">
                    <div class="con_title">
                        <h3 class="sub-title">이력정보</h3>
                    </div>
                    <table class="Table Form-type">
                        <colgroup>
                            <col class="w150px">
                            <col class="wAuto">
                        </colgroup>
                        <tbody>
                            <tr>
                                <th>최초생성자</th>
                                <td></td>
                            </tr>
                            <tr>
                                <th>최초생성일시</th>
                                <td></td>
                            </tr>
                            <tr>
                                <th>최종변경자</th>
                                <td></td>
                            </tr>
                            <tr>
                                <th>최종변경일시</th>
                                <td></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <!-- col1 :end -->

            <!-- col2 :start -->
            <div class="half-contents">
                <div id="member_info" class="table_wrap">
                    <div class="con_title">
                        <h3 class="sub-title">그룹멤버정보</h3>
                        <div class="btn-right">
                            <div class="tip_btn">
                                <button class="Button btn-ico btn-add" id="btn_add_member">추가/등록</button>
                                <div class="Tooltip">추가/등록</div>
                            </div>
                            <div class="tip_btn">
                                <button class="Button btn-ico btn-del" id="btn_del_member">삭제</button>
                                <div class="Tooltip">삭제</div>
                            </div>
                        </div>
                    </div>
                    <div class="list" id="member_grid"></div>
                </div>
            </div>
            <!-- col2 :end -->
        </div>
        <!-- Button area -->
        <div class="btn-wrap btn-right">
            <button class="Button btn" id="btn_list">목록</button>
            <button class="Button btn bg-red" id="btn_save">저장</button>
        </div>
    </div>
</div>
<!-- //contents -->
{% endblock %}
