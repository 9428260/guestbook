<!--<body oncontextmenu="return false" ondragstart="return false">-->
<body class="bg-white">
<form id="frmPassword" name="frmPassword" action="/user/password" method="POST">
    <div class="opme-wrap">
        <!-- header -->
        <header class="opme-header">
            <!--h1 class="logo">OPMATE</h1-->
            <img class="logo-img" src="{{ url_for('static', filename='images/Logo_b_197x36.png') }}"/>
            <!-- utils -->

            <!-- //utils -->
        </header>
        <!-- //header -->

        <!-- container -->
        <div id="login_wrap-bg">
            <div class="login-wrap">
                <h2 class="login-title">패스워드 변경</h2>
                <div class="login-box">
                    <dl class="login-form" id="login_info">
                        <dt>아이디*</dt>
                        <dd>
                            <input type="text" class="Textinput validation_tgt" placeholder="" id="user_id" name="user_id" />
                            <p class="validation_msg"></p>
                        </dd>
                        <dt>기존 패스워드*</dt>
                        <dd>
                            <input type="password" class="Textinput validation_tgt" placeholder="" id="current_pw" name="current_pw" />
                            <p class="validation_msg"></p>
                        </dd>
                        <dt>새 패스워드*</dt>
                        <dd>
                            <input type="password" class="Textinput validation_tgt" placeholder="" id="input_pw" name="input_pw" />
                            <p class="validation_msg"></p>
                        </dd>
                        <dt>새 패스워드 확인*</dt>
                        <dd>
                            <input type="password" class="Textinput validation_tgt" placeholder="" id="confirm_pw" name="confirm_pw" />
                            <p class="validation_msg"></p>
                        </dd>
                    </dl>
                </div>
                <div class="btn-wrap btn-right">
                    <button class="Button btn" id="btn_login">로그인 화면</button>
                    <button class="Button btn bg-red" id="btn_change">변경</button>
                </div>
            </div>
        </div>
        <!-- //container -->
    </div>
</form>

<!-- message layer popup -->
<div class="popup-message w400px h200px">
    <div class="popup-header">알림</div>
    <div class="message"></div>
    <div class="popup-btn_wrap msg">
        <button id="btn_close_popup_message" class="Button btn sm bg-red">닫기</button>
    </div>
</div>
<!-- //message layer popup -->
</body>
