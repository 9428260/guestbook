<!--
   [2023.11.04] SKT-PRD 보안인증 심사 보완사항
   마스킹 해제를 위한 패스워드 OR 2차 인증코드를 입력 받는 팝업창
   패스워드 OR 2차 인증 코드를 입력 받음
-->
{% extends "common_popup.html" %}
{% block page_resource %}
<script type="text/javascript">
var mfa_key_yn = '{{ mfa_key_yn | safe }}';
var user_id = '{{ user_id | safe }}';
</script>
<script src="{{ url_for('static', filename='js/user/popup/popup_login.js') }}"></script>
{% endblock %}

{% block page_content %}
<div class="popup-contents">
    <div id="pw">
        <div class="con_title">
            <!--h3 class="sub-title">패스워드</h3-->
            <div class="title-txt">인증을 위한 패스워드를 입력해주십시요</div>
        </div>
        <table class="Table Form-type">
            <colgroup>
                <col class="w130px">
                <col class="wAuto">
            </colgroup>
            <tbody>
            <tr>
                <th>패스워드</th>
                <td>
                    <!--input type="text" id="input_password" name="input_password" class="Textinput textinput_c w150px validation_tgt" placeholder="Input Password."/-->
                    <input type="password" class="Textinput textinput_c w180px" placeholder="" id="password" name="password" />
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    <div id="token" style="display: none;">
        <div class="con_title">
            <!--h3 class="sub-title">인증코드</h3-->
            <div class="title-txt">Google Authenticator App. 의 인증코드를 입력해주세요.</div>
        </div>
        <table class="Table Form-type">
            <colgroup>
                <col class="w130px">
                <col class="wAuto">
            </colgroup>
            <tbody>
            <tr>
                <th>인증코드</th>
                <td>
                    <!--input type="text" id="input_password" name="input_password" class="Textinput textinput_c w150px validation_tgt" placeholder="Input Password."/-->
                    <input type="text" class="Textinput" placeholder="000000" id="verification_code" name="verification_code" />
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    <span id="error_txt" class="error_txt"></span>
    <!--button-->
    <div class="popup-btn_wrap">
        <button id="btn_certify" name="btn_certify"  class="Button btn bg-red">인증</button>
        <button id="btn_close"  name="btn_close" class="Button btn">닫기</button>
    </div>
    <!--//button-->
</div>
{% endblock %}
