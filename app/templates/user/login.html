<body class="bg-white">
<form id="frmLogin" name="frmLogin" action="/user/login" method="POST">
    <div class="opme-wrap">
        <!-- header -->
        <header class="opme-header">
            <!--h1 class="logo">OPMATE</h1-->
            <img class="logo-img" src="{{ url_for('static', filename='images/Logo_b_197x36.png') }}"/>
            <!-- utils -->

            <!-- //utils -->
        </header>
        <!-- //header -->

        <!-- container -->
        <div id="login_wrap-bg">
            <div class="login-wrap">
                <h2 class="login-title">로그인</h2>
                <div class="login-box">
                    <dl class="login-form" id="login_info">
                        <dt>아이디</dt>
                        <dd><input type="text" class="Textinput" placeholder="" id="user_id" name="user_id" /></dd>
                        <dt>패스워드</dt>
                        <dd>
                            <input type="password" class="Textinput" placeholder="" id="password" name="password" />
                                <!--
                                <p>
                                    <label class="ImageCheckbox" id="checkTest01">
                                        <input class="Checkbox" type="checkbox" name="chk1" value="check1" checked="checked"> 아이디 저장
                                    </label>
                                </p>
                                -->
                            <span class="error_txt">&nbsp;</span>
                        </dd>
                    </dl>
                    <div class="login-form" id="verification_info" style="display: none;">
                        <p>보유하고 계신 휴대기기 Google Authenticator App. 의 인증코드를 입력해주세요.</p>
                        <p>
                            <input type="text" class="Textinput" placeholder="000000" id="verification_code" name="verification_code" />
                            <span class="error_txt" id="error_msg1">&nbsp;</span><br/>
                            <span class="error_txt" id="error_msg2"></span>
                        </p>
                        <!--
                        <dt>인증코드</dt>
                        <dd>
                            <input type="text" class="Textinput" placeholder="" id="verification_code" name="verification_code" />
                            <span class="error_txt">&nbsp;</span>
                        </dd>
                        -->
                    </div>
                </div>
                <p class="btn_warp">
                    <input type="button" id="btn_login"  class="Button btn bg-red w180px btn_round" value="로그인">
                    <input type="button" id="btn_verify" class="Button btn bg-red w180px btn_round" value="인증요청" style="display: none;">
                    <!--a class="Button btn bg-red w180px btn_round" href="#">로그인</a-->
                </p>
                <ul class="login_guide">
                    <li id="go_password">
                        <!--a href="./join">신규 가입/비밀번호 분실 또는 시스템과 관련한 장애 문의</a-->
                        <a href="#">패스워드 변경</a>
                    </li>
                    <li id="go_help">
                        <a href="#">담당자 문의 (신규 가입/비밀번호 분실/시스템 장애 등)</a>
                    </li>
                </ul>
                <!--
                <ul class="login_guide">
                    <li>
                        서비스 이용을 위한 </br>
                        계정이 아직 없으신가요?</br>
                        <a class="Button btn btn_line btn_round sm icon" href="./join">회원가입<span class="icon_arrow"></span></a>
                    </li>
                    <li>
                        비밀번호가 </br>
                        생각나지 않으세요?</br>
                        <a class="Button btn btn_line btn_round sm icon" href="./init-password">비밀번호 찾기<span class="icon_arrow"></span></a>
                    </li>
                </ul>
                -->
            </div>
        </div>
        <!-- //container -->
    </div>
</form>

<!-- message layer popup -->
<div class="popup-message w400px h200px">
    <div class="popup-header">알림</div>
    <div class="message"></div>
    <div class="popup-btn_wrap msg">
        <button id="btn_close_popup_message" class="Button btn sm bg-red">닫기</button>
    </div>
</div>
