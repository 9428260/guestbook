{% extends "common.html" %}
{% block page_resource %}
<script src="{{ url_for('static', filename='js/user/user_pw_dtl.js') }}"></script>
<script type="text/javascript">
{% if response is defined %}
var response = JSON.parse('{{ response|tojson }}');
{% endif %}
</script>
{% endblock %}

{% block page_content %}
<!-- contents -->
<div class="contents-area">
    <!-- top area -->
    <div class="cont_head">
        <h2 class="title">내 패스워드 변경</h2>
        <div class="title-txt">패스워드를 변경합니다.</div>
    </div>

    <div class="cont_body">
        <div id="pw_info" class="table_wrap">
            <div class="con_title">
                <h3 class="sub-title">패스워드 변경 정보</h3>
            </div>
            <table class="Table Form-type">
                <colgroup>
                    <col class="w150px">
                    <col class="wAuto">
                </colgroup>
                <tbody>
                    <tr>
                        <th>현재 패스워드*</th>
                        <td>
                            <input id="current_pw" name="current_pw" class="Textinput validation_tgt" placeholder="" type="password"/>
                            <p class="validation_msg"></p>
                        </td>
                    </tr>
                    <tr>
                        <th>새 패스워드*</th>
                        <td>
                            <input id="input_pw" name="input_pw" class="Textinput validation_tgt" placeholder="" type="password"/>
                            <p class="validation_msg"></p>
                        </td>
                    </tr>
                    <tr>
                        <th>새 패스워드 확인*</th>
                        <td>
                            <input id="confirm_pw" name="confirm_pw" class="Textinput validation_tgt" placeholder="" type="password"/>
                            <p class="validation_msg"></p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <!-- Button area -->
    <div class="btn-wrap btn-right">
        <button class="Button btn" id="btn_info">내 정보</button>
        <button class="Button btn bg-red" id="btn_change">변경</button>
    </div>
</div>
<!-- //contents wrap-->
{% endblock %}
