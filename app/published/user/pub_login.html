<!DOCTYPE html>
<html lang="ko">

<head>
    <title>OPMATE eyes</title>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- alopex css -->
    <!--link rel="stylesheet" type="text/css" href="../../static/css/libs/alopex/dash/1.1.3/alopex-dash.css"-->
    <link rel="stylesheet" type="text/css" href="../../static/css/libs/alopex/ui/3.0.16/alopex-ui-default.css">
    <link rel="stylesheet" type="text/css" href="../../static/css/libs/alopex/ui/3.0.16/src/alopex-ext.css">
    <link rel="stylesheet" type="text/css" href="../../static/css/libs/alopex/grid/3.12.19/alopex-grid.css">

    <!-- custom css-->
    <link rel="stylesheet" type="text/css" href="../../static/css/opme-alopex-ui.css">
    <link rel="stylesheet" type="text/css" href="../../static/css/opme-alopex-grid.css">
    <link rel="stylesheet" type="text/css" href="../../static/css/opme-comp.css">
    <link rel="stylesheet" type="text/css" href="../../static/css/opme-layout.css">
    <link rel="stylesheet" type="text/css" href="../../static/css/opme-biz.css">

    <!-- jquery -->
    <script src="../jquery-3.5.1.min.js"></script>

    <!-- alopex js -->
    <script src="../../static/js/libs/alopex/ui/3.0.16/alopex-ui.min.js"></script>
    <script src="../../static/js/libs/alopex/ui/3.0.16/src/alopex-ext.min.js"></script>
    <script src="../../static/js/libs/alopex/ui/3.0.16/src/alopex-ext-setup.js"></script>
    <script src="../../static/js/libs/alopex/grid/3.12.19/alopex-grid.min.js"></script>

    <!-- custom javascript -->
    <script src="../publish-ui.js"></script>
    <script src="../publish-grid.js"></script>
</head>

<body>
    <div class="opme-wrap">
        <!-- header -->
        <header class="opme-header">
            <h1 class="logo">OPMATE</h1>
            <!-- utils -->
            <div class="header-utils">
                <span class="user-organ">System Admin</span>
                <a class="user">이선경님<span class="info-num">5</span></a>
                <a href="#none" class="drop_btn">메뉴오픈</a>
                <!--하위 오픈시  drop_close 추가 -->
                <div class="user-menus">
                    <ul class="dropmenu-list">
                        <li class="selected">나의 정보</li>
                        <li>비밀번호 변경</li>
                        <li>나의 프로젝트</li>
                        <li>로그아웃</li>
                    </ul>
                </div>
            </div>
            <!-- //utils -->
        </header>
        <!-- //header -->

        <!-- container -->
        <div id="login_wrap-bg">
            <div class="login-wrap">
                <h2 class="login-title">로그인</h2>
                <div class="login-box">
                    <dl class="login-form">
                        <dt>아이디</dt>
                        <dd><input type="text" class="Textinput" placeholder="Username" /></dd>
                        <dt>비밀번호</dt>
                        <dd>
                            <input type="text" class="Textinput" placeholder="Password" />
                            <p>
                                <label class="ImageCheckbox" id="checkTest01">
                                    <input class="Checkbox" type="checkbox" name="chk1" value="check1" checked="checked"> 아이디 저장
                                </label>
                            </p>
                            <p class="error_txt">
                                로그인에 실패했습니다.<br />
                                오류 메시지~~~~
                            </p>
                        </dd>
                    </dl>
                </div>
                <p class="btn_warp">
                    <a class="Button btn bg-red w180px btn_round" href="#">로그인</a>
                </p>

                <ul class="login_guide">
                    <li>
                        서비스 이용을 위한 </br>
                        계정이 아직 없으신가요?</br>
                        <a class="Button btn btn_line btn_round sm icon" href="#">회원가입<span class="icon_arrow"></span></a>
                    </li>
                    <li>
                        비밀번호가 </br>
                        생각나지 않으세요?</br>
                        <a class="Button btn btn_line btn_round sm icon" href="#">비밀번호 찾기<span class="icon_arrow"></span></a>
                    </li>
                </ul>

            </div>
        </div>

        <!-- //container -->
    </div>
</body>

</html>
